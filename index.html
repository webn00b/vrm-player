<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRM BVH Player</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: #111; overflow: hidden; font-family: system-ui, sans-serif; color: #e0e0e0; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* ── Shared panel ── */
      .panel {
        position: absolute;
        background: rgba(16, 16, 16, 0.92);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 10px;
        padding: 12px 14px;
      }
      .panel-title {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        opacity: 0.4;
        margin: 0 0 8px;
      }

      /* ── Right column: library + queue ── */
      #right-col {
        position: absolute;
        top: 12px;
        right: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 230px;
        max-height: calc(100vh - 24px);
      }

      /* ── Library ── */
      #library-panel { flex-shrink: 0; max-height: 45vh; overflow-y: auto; }

      #library-list {
        list-style: none;
        margin: 0; padding: 0;
        display: flex; flex-direction: column; gap: 2px;
      }
      .lib-item {
        font-size: 12px;
        font-family: ui-monospace, monospace;
        padding: 5px 8px;
        border-radius: 5px;
        cursor: grab;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        border: 1px solid transparent;
        transition: background 100ms, border-color 100ms;
      }
      .lib-item:hover     { background: #222; border-color: rgba(255,255,255,0.08); }
      .lib-item.dragging  { opacity: 0.4; cursor: grabbing; }

      /* ── Queue ── */
      #queue-panel { flex: 1 1 0; overflow: hidden; display: flex; flex-direction: column; }

      #queue-list-wrap {
        flex: 1 1 0;
        overflow-y: auto;
        position: relative;
        min-height: 80px;
      }

      #queue-list {
        list-style: none;
        margin: 0; padding: 0;
        display: flex; flex-direction: column; gap: 2px;
        min-height: 100%;
      }

      /* Empty-state drop zone */
      #queue-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        position: absolute;
        inset: 0;
        border: 2px dashed rgba(255,255,255,0.12);
        border-radius: 6px;
        color: rgba(255,255,255,0.25);
        font-size: 11px;
        text-align: center;
        pointer-events: auto;
        transition: border-color 150ms, color 150ms;
      }
      #queue-empty.drag-over {
        border-color: rgba(59, 91, 219, 0.7);
        color: rgba(59, 91, 219, 0.9);
      }
      #queue-empty svg { opacity: 0.4; }

      /* Queue items */
      .q-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-family: ui-monospace, monospace;
        padding: 5px 6px 5px 8px;
        border-radius: 5px;
        cursor: grab;
        border: 1px solid transparent;
        transition: background 100ms;
      }
      .q-item:hover { background: #222; }
      .q-item.active { background: #1e3a8a; border-color: #3b5bdb; color: #fff; }
      .q-item.dragging { opacity: 0.35; cursor: grabbing; }
      .q-item.drop-before { box-shadow: 0 -2px 0 #3b5bdb; }
      .q-item.drop-after  { box-shadow: 0  2px 0 #3b5bdb; }

      .q-num   { opacity: 0.4; flex-shrink: 0; width: 22px; }
      .q-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .q-remove {
        flex-shrink: 0;
        background: none;
        border: none;
        color: rgba(255,255,255,0.25);
        cursor: pointer;
        font-size: 10px;
        padding: 2px 4px;
        border-radius: 3px;
        line-height: 1;
        transition: color 100ms, background 100ms;
      }
      .q-remove:hover { color: #f87171; background: rgba(248,113,113,0.12); }

      /* ── Debug / Layers panel (left) ── */
      #debug-panel {
        position: absolute;
        top: 12px;
        left: 12px;
        width: 220px;
      }

      .dbg-section { display: flex; flex-direction: column; gap: 5px; }
      .dbg-row {
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
      }
      .dbg-label { font-size: 12px; }
      .dbg-toggle {
        font-size: 10px; font-weight: 700;
        padding: 2px 8px; border-radius: 4px; border: none;
        cursor: pointer; background: #166534; color: #fff;
        letter-spacing: 0.04em; min-width: 36px; transition: background 120ms;
      }
      .dbg-toggle.off { background: #7f1d1d; }
      .dbg-hint {
        font-size: 10px; opacity: 0.4; line-height: 1.4; margin-top: 1px; padding-left: 1px;
      }
      .dbg-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 6px 0; }
      .dbg-levels  { display: flex; flex-direction: column; gap: 6px; }
      .dbg-level-row { display: flex; flex-direction: column; gap: 2px; }
      .dbg-lv-label { font-size: 10px; opacity: 0.45; }
      .dbg-bar-wrap {
        height: 5px; background: rgba(255,255,255,0.07);
        border-radius: 3px; overflow: hidden;
      }
      .dbg-bar { height: 100%; width: 0%; border-radius: 3px; transition: width 200ms ease, opacity 200ms; }
      #dbg-bar-1 { background: #0d9488; }
      #dbg-bar-2 { background: #3b5bdb; }
      #dbg-bar-5 { background: #e76f51; }
      .dbg-stat  { font-size: 10px; opacity: 0.35; margin-top: 6px; font-family: ui-monospace, monospace; }

      .dbg-tabs {
        display: flex; gap: 2px; margin-bottom: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.07);
      }
      .dbg-tab {
        flex: 1; background: transparent; color: #fff;
        font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
        padding: 6px 10px; border: none; border-bottom: 2px solid transparent;
        cursor: pointer; opacity: 0.45; transition: opacity 120ms, border-color 120ms;
      }
      .dbg-tab:hover { opacity: 0.75; }
      .dbg-tab.active { opacity: 1; border-bottom-color: #3b5bdb; }
      .dbg-tab-panel { display: none; }
      .dbg-tab-panel.active { display: block; }

      /* ── Status bar ── */
      #status {
        position: absolute;
        bottom: 12px; left: 12px;
        font-size: 11px; opacity: 0.5;
        font-family: ui-monospace, monospace;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- Left: layers / debug -->
    <div id="debug-panel" class="panel"><!-- populated by debugPanel.ts --></div>

    <!-- Right column -->
    <div id="right-col">

      <!-- Library -->
      <div id="library-panel" class="panel">
        <p class="panel-title">Library</p>
        <ul id="library-list"></ul>
      </div>

      <!-- Queue -->
      <div id="queue-panel" class="panel">
        <p class="panel-title">Queue</p>
        <div id="queue-list-wrap">
          <ul id="queue-list"></ul>
          <div id="queue-empty">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 5v14M5 12l7-7 7 7"/>
            </svg>
            Drag animations here
          </div>
        </div>
      </div>

    </div>

    <!-- Hidden video element for mocap webcam feed -->
    <video id="mocap-video" playsinline style="display:none"></video>

    <div id="status">booting…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
